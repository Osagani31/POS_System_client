<div class="app-shell">
  <mat-toolbar class="header-toolbar">
    <div class="toolbar-content">

      <div class="brand-section">
        <span class="brand-mark"><mat-icon>storefront</mat-icon></span>
        <span class="brand-name">POS System</span>
      </div>

      <nav class="nav-links">
        <a mat-button
           routerLink="/dashboard/customers"
           routerLinkActive="active-link"
           class="nav-link">
          <mat-icon>people_outline</mat-icon>
          <span>Customers</span>
        </a>

        <a mat-button
           routerLink="/dashboard/products"
           routerLinkActive="active-link"
           class="nav-link">
          <mat-icon>inventory_2</mat-icon>
          <span>Products</span>
        </a>

        <a mat-button
           routerLink="/dashboard/orders"
           routerLinkActive="active-link"
           class="nav-link">
          <mat-icon>receipt_long</mat-icon>
          <span>Orders</span>
        </a>
      </nav>

      <div class="user-section">
        <button mat-icon-button [matMenuTriggerFor]="userMenu" class="user-menu-button">
          <span class="avatar">{{ 'test@gmail.com' | slice:0:1 | uppercase }}</span>
        </button>

        <mat-menu #userMenu="matMenu" xPosition="before">
          <div class="user-info">
            <mat-icon>mail_outline</mat-icon>
            <span>{{ 'test@gmail.com' }}</span>
          </div>
          <mat-divider></mat-divider>
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>Logout</span>
          </button>
        </mat-menu>
      </div>
    </div>
  </mat-toolbar>

  <main class="app-content">
    <router-outlet/>
  </main>
</div>
