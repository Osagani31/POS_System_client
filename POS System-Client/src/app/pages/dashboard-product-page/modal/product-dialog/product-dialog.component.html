<div class="dialog-container">
  <h2 mat-dialog-title>{{ dialogTitle }}</h2>

  <mat-dialog-content>
    <form [formGroup]="productForm" class="form-grid">

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Description</mat-label>
        <input matInput formControlName="description" placeholder="Ex. 500ml Bottled Water" />
        <mat-icon matPrefix>inventory_2</mat-icon>
        <mat-error *ngIf="productForm.get('description')?.hasError('required')">
          Description is required
        </mat-error>
        <mat-error *ngIf="productForm.get('description')?.hasError('minlength')">
          Description must be at least 3 characters
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Unit Price</mat-label>
        <input matInput type="number" step="0.01" formControlName="unitPrice" placeholder="0.00" />
        <mat-icon matPrefix>payments</mat-icon>
        <span matTextSuffix>LKR</span>
        <mat-error *ngIf="productForm.get('unitPrice')?.hasError('required')">
          Unit price is required
        </mat-error>
        <mat-error *ngIf="productForm.get('unitPrice')?.hasError('min')">
          Unit price must be greater than 0
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Quantity on Hand</mat-label>
        <input matInput type="number" formControlName="qtyOnHand" placeholder="0" />
        <mat-icon matPrefix>widgets</mat-icon>
        <span matTextSuffix>units</span>
        <mat-error *ngIf="productForm.get('qtyOnHand')?.hasError('required')">
          Quantity is required
        </mat-error>
        <mat-error *ngIf="productForm.get('qtyOnHand')?.hasError('min')">
          Quantity cannot be negative
        </mat-error>
      </mat-form-field>
    </form>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button (click)="onCancel()" [disabled]="isLoading" class="btn-cancel">
      Cancel
    </button>
    <button mat-flat-button (click)="onSubmit()" [disabled]="productForm.invalid || isLoading" class="btn-submit">
      <mat-icon *ngIf="!isLoading">{{ isEditMode ? 'update' : 'save' }}</mat-icon>
      <span *ngIf="isLoading">Processing…</span>
      <span *ngIf="!isLoading">{{ isEditMode ? 'Update' : 'Create' }}</span>
    </button>
  </mat-dialog-actions>
</div>
